<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card</title>
    <link rel="stylesheet" href="creditcard.css">
    <script src="creditcard.js" defer></script>
</head>
<body>

<main>
  <div class="card">
    <p class="total">TOTAL: $199 <span class="emoji">💳</span></p>

    <div class="box">
      <label>CARD NUMBER</label>
      <input type="text" placeholder="1234 5678 9101 1020" />
    </div>

    <div class="row">
      <div>
        <label>CARD HOLDER</label>
        <input type="text" placeholder="John Doe" />
      </div>

      <div id="cardExpiration">
        <label id="expirationDate">EXPIRATION</label>
        <input type="text" id="month" name="expMonth" placeholder="MM">
        <input type="text" id="year" name="expYear" placeholder="YY">
      </div>
    </div>
  </div>

  <div class="card2">
    <div class="stripe"></div>

    <label>CVC/CVV</label>
    <div class="cvv-box">
      <input type="text" placeholder="XXX" />
    </div>
  </div>

  <button class="submit">Submit</button>
</main>

</body>
</html>
